<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="theme-btn" aria-label="테마 변경">🌙</button>
    </div>
    <h1>🍀 로또 번호 추천</h1>
    <div id="lotto-container">
      <div class="placeholder">행운의 번호를 생성해보세요!</div>
    </div>
    <button id="generate-btn">번호 생성하기</button>

    <div class="contact-section">
      <hr>
      <h3>🤝 제휴 문의</h3>
      <form action="https://formspree.io/f/mojkagbn" method="POST">
        <div class="input-group">
          <input type="text" name="name" placeholder="성함" required>
        </div>
        <div class="input-group">
          <input type="email" name="_replyto" placeholder="이메일 주io" required>
        </div>
        <div class="input-group">
          <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>

    <div class="comments-section">
      <hr>
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://materiallink.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
