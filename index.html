<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인공지능 동물상 테스트</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <!-- TensorFlow.js and Teachable Machine libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="theme-toggle">
      <button id="theme-btn" aria-label="테마 변경">🌙</button>
    </div>
    <h1>🐶 인공지능 동물상 테스트 🐱</h1>
    <p class="subtitle">나의 얼굴은 어떤 동물을 닮았을까?</p>
    
    <div class="upload-section">
      <div id="upload-area" class="upload-box">
        <span class="upload-icon">📸</span>
        <p>사진을 올리거나 눌러서 업로드하세요</p>
        <input type="file" id="image-input" accept="image/*" hidden>
      </div>
      <div id="image-container" class="hidden">
        <img id="face-image" src="#" alt="your image" />
        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>분석 중...</p>
        </div>
      </div>
    </div>

    <div id="label-container"></div>
    <button id="retry-btn" class="hidden">다시 시도하기</button>

    <div class="contact-section">
      <hr>
      <h3>🤝 제휴 문의</h3>
      <form action="https://formspree.io/f/mojkagbn" method="POST">
        <div class="input-group">
          <input type="text" name="name" placeholder="성함" required>
        </div>
        <div class="input-group">
          <input type="email" name="_replyto" placeholder="이메일 주소" required>
        </div>
        <div class="input-group">
          <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </div>

    <div class="comments-section">
      <hr>
      <div id="disqus_thread"></div>
      <script>
          (function() { 
          var d = document, s = d.createElement('script');
          s.src = 'https://materiallink.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
